<div class="auth-shell">
  <main class="auth-form-wrap single">
    <div class="auth-form fade-up">

      <span class="chip accent">◉ RECOVER ACCOUNT</span>
      <h1>Forgot password</h1>
      <p class="auth-sub">
        Driver and manager accounts can recover access using OTP verification.
      </p>

      <div class="error-banner" *ngIf="error">{{ error }}</div>
      <div class="success-banner" *ngIf="message">{{ message }}</div>
      <div class="success-banner" *ngIf="debugCode">
        Testing OTP: <strong>{{ debugCode }}</strong>
      </div>

      <form [formGroup]="form">

        <!-- STEP 1 -->
        <div *ngIf="step === 1">
          <div class="field">
            <label>Email or phone</label>
            <input
              type="text"
              formControlName="emailOrPhone"
              placeholder="Enter registered email or phone">
          </div>

          <button
            type="button"
            class="btn auth-submit"
            (click)="requestCode()"
            [disabled]="loading">
            {{ loading ? 'Sending...' : 'Send Code' }}
          </button>
        </div>

        <!-- STEP 2 -->
        <div *ngIf="step === 2">
          <div class="field">
            <label>Verification code</label>
            <input
              type="text"
              maxlength="6"
              formControlName="code"
              placeholder="Enter 6-digit code">
          </div>

          <button
            type="button"
            class="btn auth-submit"
            (click)="verifyCode()"
            [disabled]="loading">
            {{ loading ? 'Checking...' : 'Verify Code' }}
          </button>
        </div>

        <!-- STEP 3 -->
        <div *ngIf="step === 3">
          <div class="field">
            <label>New password</label>
            <input
              type="password"
              formControlName="newPassword"
              placeholder="Minimum 8 characters">
          </div>

          <button
            type="button"
            class="btn auth-submit"
            (click)="resetPassword()"
            [disabled]="loading">
            {{ loading ? 'Saving...' : 'Reset Password' }}
          </button>
        </div>

        <!-- STEP 4 -->
        <div *ngIf="step === 4" class="auth-foot">
          Password updated successfully.
          <a routerLink="/login">Return to login</a>
        </div>

      </form>

      <div class="other-cta">
        <p class="auth-foot">
          <a routerLink="/login">← Back to login</a>
        </p>
      </div>

    </div>
  </main>
</div>
